apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  description: Cleanup workspace
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: alpine:3.16
      command: ["/bin/sh", "-c"]
      args:
        - rm -rf $(workspaces.source.path)/*

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose
spec:
  description: Run unit tests with nose
  workspaces:
    - name: source
  steps:
    - name: nosetests
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        pip install nose pinocchio
        nosetests -v --with-spec --spec-color
